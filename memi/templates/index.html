<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin: 2rem 0 0.5rem;
            font-size: 2.5rem;
            letter-spacing: 0.1em;
        }

        .subtitle {
            color: #888;
            margin-bottom: 1.5rem;
        }

        .categories {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .categories button {
            padding: 0.5rem 1.2rem;
            border: 2px solid #444;
            border-radius: 2rem;
            background: transparent;
            color: #ccc;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .categories button:hover,
        .categories button.active {
            border-color: #e2b714;
            color: #e2b714;
        }

        .submenu {
            gap: 0.75rem;
            align-items: center;
            padding: 0.5rem 1rem;
        }

        .back-btn {
            border-color: #666 !important;
            color: #888 !important;
            font-size: 1.1rem !important;
            padding: 0.4rem 0.8rem !important;
        }

        .card {
            position: relative;
            width: min(500px, 90vw);
            aspect-ratio: 1;
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            background: #16213e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 1rem;
            display: block;
        }

        .card .clue {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            color: #e2b714;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            padding: 0.75rem;
            display: none;
        }

        .card .answer {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card.revealed .answer {
            opacity: 1;
        }

        .hint {
            margin-top: 1rem;
            color: #666;
            font-size: 0.9rem;
        }

        .loading {
            color: #888;
            font-size: 1.2rem;
        }

        .error {
            color: #e74c3c;
        }

        .mode-toggle {
            margin-bottom: 1rem;
        }

        .mode-toggle button {
            padding: 0.4rem 1rem;
            border: 2px solid #444;
            border-radius: 2rem;
            background: transparent;
            color: #888;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-toggle button.active {
            border-color: #e2b714;
            color: #e2b714;
        }

        #clue-btn {
            padding: 0.4rem 1rem;
            border: 2px solid #444;
            border-radius: 2rem;
            background: transparent;
            color: #ccc;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        #clue-btn:hover {
            border-color: #e2b714;
            color: #e2b714;
        }

        .clue-letters {
            margin-top: 0.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 0.15em;
            color: #e2b714;
        }
    </style>
</head>
<body>
    <h1>memi</h1>
    <p class="subtitle">practise your memory</p>

    <div class="categories" id="main-categories">
        {% for cat in categories %}
        <button onclick="selectCategory('{{ cat.key }}'); this.classList.add('active')">{{ cat.label }}</button>
        {% endfor %}
        {% for parent, subs in subcategories.items() %}
        <button onclick="toggleSubmenu('{{ parent }}')">{{ parent }}</button>
        {% endfor %}
    </div>

    <div class="categories submenu" id="submenu" style="display:none">
        <button class="back-btn" onclick="closeSubmenu()">&larr;</button>
        <div id="submenu-buttons" style="display:flex; gap:0.75rem; flex-wrap:wrap; justify-content:center;"></div>
    </div>

    <div class="mode-toggle">
        <button id="clue-toggle" onclick="toggleClueMode()">clues: off</button>
    </div>

    <div class="card" id="card" onclick="handleClick()">
        <span class="loading" id="status">pick a category</span>
        <img id="image" style="display:none" alt="">
        <div class="clue" id="clue"></div>
        <div class="answer" id="answer"></div>
    </div>
    <div id="clue-area" style="display:none; margin-top:1rem; text-align:center;">
        <button id="clue-btn" onclick="revealLetter()">show letter</button>
        <p id="clue-letters" class="clue-letters"></p>
    </div>
    <p class="hint" id="hint"></p>

    <script>
        let selectedCategories = [];
        let revealed = false;
        let loaded = false;
        let clueMode = false;
        let currentName = '';
        let lettersRevealed = 0;

        const subcategories = {{ subcategories | tojson }};

        function selectCategory(cat) {
            selectedCategories = [cat];
            document.querySelectorAll('#main-categories button').forEach(b => {
                if (b.classList.contains('back-btn')) return;
                b.classList.remove('active');
            });
            loadNew();
        }

        const singleSelectParents = ['countries'];
        let currentParent = null;

        function toggleSubmenu(parent) {
            const main = document.getElementById('main-categories');
            const submenu = document.getElementById('submenu');
            const buttons = document.getElementById('submenu-buttons');
            selectedCategories = [];
            currentParent = parent;

            buttons.innerHTML = '';
            for (const sub of subcategories[parent]) {
                const btn = document.createElement('button');
                btn.textContent = sub.label;
                btn.dataset.key = sub.key;
                btn.onclick = function() { toggleSubcategory(sub.key, this); };
                buttons.appendChild(btn);
            }

            main.style.display = 'none';
            submenu.style.display = 'flex';
        }

        function toggleSubcategory(key, btn) {
            const isSingleSelect = singleSelectParents.includes(currentParent);
            const wasEmpty = selectedCategories.length === 0;
            const idx = selectedCategories.indexOf(key);

            if (isSingleSelect) {
                // Deselect all others
                document.querySelectorAll('#submenu-buttons button').forEach(b => b.classList.remove('active'));
                if (idx !== -1) {
                    selectedCategories = [];
                    return;
                }
                selectedCategories = [key];
                btn.classList.add('active');
            } else {
                if (idx === -1) {
                    selectedCategories.push(key);
                    btn.classList.add('active');
                } else {
                    selectedCategories.splice(idx, 1);
                    btn.classList.remove('active');
                }
            }

            if (selectedCategories.length > 0 && (wasEmpty || isSingleSelect)) {
                loadNew();
            }
        }

        function toggleClueMode() {
            clueMode = !clueMode;
            const btn = document.getElementById('clue-toggle');
            btn.textContent = clueMode ? 'clues: on' : 'clues: off';
            btn.classList.toggle('active', clueMode);
            document.getElementById('clue-area').style.display = (clueMode && loaded && !revealed) ? 'block' : 'none';
        }

        function revealLetter() {
            if (lettersRevealed >= currentName.length) return;
            lettersRevealed++;
            updateClueDisplay();
        }

        function updateClueDisplay() {
            let display = '';
            for (let i = 0; i < currentName.length; i++) {
                if (currentName[i] === ' ') {
                    display += '  ';
                } else if (i < lettersRevealed) {
                    display += currentName[i];
                } else {
                    display += '_';
                }
            }
            document.getElementById('clue-letters').textContent = display;
        }

        function closeSubmenu() {
            document.getElementById('main-categories').style.display = 'flex';
            document.getElementById('submenu').style.display = 'none';
            selectedCategories = [];
        }

        async function loadNew() {
            if (selectedCategories.length === 0) return;

            const card = document.getElementById('card');
            const image = document.getElementById('image');
            const clue = document.getElementById('clue');
            const answer = document.getElementById('answer');
            const status = document.getElementById('status');
            const hint = document.getElementById('hint');

            card.classList.remove('revealed');
            image.style.display = 'none';
            clue.style.display = 'none';
            clue.textContent = '';
            status.style.display = 'block';
            status.textContent = 'loading...';
            status.className = 'loading';
            hint.textContent = '';
            revealed = false;
            loaded = false;

            try {
                const cats = selectedCategories.join(',');
                const resp = await fetch(`/api/random?cats=${encodeURIComponent(cats)}`);
                const data = await resp.json();

                if (data.error) {
                    status.textContent = data.error;
                    status.className = 'error';
                    return;
                }

                image.src = data.image;
                image.onload = () => {
                    status.style.display = 'none';
                    image.style.display = 'block';
                    if (data.clue) {
                        clue.textContent = data.clue;
                        clue.style.display = 'block';
                    }
                    currentName = data.name;
                    lettersRevealed = 0;
                    answer.textContent = data.name;
                    hint.textContent = 'click the image to reveal the answer';
                    loaded = true;
                    const clueArea = document.getElementById('clue-area');
                    if (clueMode) {
                        updateClueDisplay();
                        clueArea.style.display = 'block';
                    } else {
                        clueArea.style.display = 'none';
                    }
                };
            } catch (e) {
                status.textContent = 'failed to load';
                status.className = 'error';
            }
        }

        function handleClick() {
            if (!loaded) return;
            if (!revealed) {
                document.getElementById('card').classList.add('revealed');
                document.getElementById('hint').textContent = 'click again for a new one';
                document.getElementById('clue-area').style.display = 'none';
                revealed = true;
            } else if (selectedCategories.length > 0) {
                loadNew();
            }
        }
    </script>
</body>
</html>
