<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin: 2rem 0 0.5rem;
            font-size: 2.5rem;
            letter-spacing: 0.1em;
        }

        .subtitle {
            color: #888;
            margin-bottom: 1.5rem;
        }

        .categories {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .categories button {
            padding: 0.5rem 1.2rem;
            border: 2px solid #444;
            border-radius: 2rem;
            background: transparent;
            color: #ccc;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .categories button:hover,
        .categories button.active {
            border-color: #e2b714;
            color: #e2b714;
        }

        .submenu {
            gap: 0.75rem;
            align-items: center;
            padding: 0.5rem 1rem;
        }

        .back-btn {
            border-color: #666 !important;
            color: #888 !important;
            font-size: 1.1rem !important;
            padding: 0.4rem 0.8rem !important;
        }

        .card {
            position: relative;
            width: min(500px, 90vw);
            aspect-ratio: 1;
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            background: #16213e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 1rem;
            display: block;
        }

        .card .answer {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card.revealed .answer {
            opacity: 1;
        }

        .hint {
            margin-top: 1rem;
            color: #666;
            font-size: 0.9rem;
        }

        .loading {
            color: #888;
            font-size: 1.2rem;
        }

        .error {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <h1>memi</h1>
    <p class="subtitle">practise your memory</p>

    <div class="categories" id="main-categories">
        {% for cat in categories %}
        <button onclick="selectCategory('{{ cat.key }}'); this.classList.add('active')">{{ cat.label }}</button>
        {% endfor %}
        {% for parent, subs in subcategories.items() %}
        <button onclick="toggleSubmenu('{{ parent }}')">{{ parent }}</button>
        {% endfor %}
    </div>

    <div class="categories submenu" id="submenu" style="display:none">
        <button class="back-btn" onclick="closeSubmenu()">&larr;</button>
        <span id="submenu-buttons"></span>
    </div>

    <div class="card" id="card" onclick="handleClick()">
        <span class="loading" id="status">pick a category</span>
        <img id="image" style="display:none" alt="">
        <div class="answer" id="answer"></div>
    </div>
    <p class="hint" id="hint"></p>

    <script>
        let currentCategory = null;
        let revealed = false;
        let loaded = false;

        const subcategories = {{ subcategories | tojson }};

        function selectCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.categories button').forEach(b => {
                if (b.classList.contains('back-btn')) return;
                b.classList.remove('active');
            });
            loadNew();
        }

        function toggleSubmenu(parent) {
            const main = document.getElementById('main-categories');
            const submenu = document.getElementById('submenu');
            const buttons = document.getElementById('submenu-buttons');

            buttons.innerHTML = '';
            for (const sub of subcategories[parent]) {
                const btn = document.createElement('button');
                btn.textContent = sub.label;
                btn.onclick = function() { selectCategory(sub.key); this.classList.add('active'); };
                buttons.appendChild(btn);
            }

            main.style.display = 'none';
            submenu.style.display = 'flex';
        }

        function closeSubmenu() {
            document.getElementById('main-categories').style.display = 'flex';
            document.getElementById('submenu').style.display = 'none';
        }

        async function loadNew() {
            const card = document.getElementById('card');
            const image = document.getElementById('image');
            const answer = document.getElementById('answer');
            const status = document.getElementById('status');
            const hint = document.getElementById('hint');

            card.classList.remove('revealed');
            image.style.display = 'none';
            status.style.display = 'block';
            status.textContent = 'loading...';
            status.className = 'loading';
            hint.textContent = '';
            revealed = false;
            loaded = false;

            try {
                const resp = await fetch(`/api/random/${currentCategory}`);
                const data = await resp.json();

                if (data.error) {
                    status.textContent = data.error;
                    status.className = 'error';
                    return;
                }

                image.src = data.image;
                image.onload = () => {
                    status.style.display = 'none';
                    image.style.display = 'block';
                    answer.textContent = data.name;
                    hint.textContent = 'click the image to reveal the answer';
                    loaded = true;
                };
            } catch (e) {
                status.textContent = 'failed to load';
                status.className = 'error';
            }
        }

        function handleClick() {
            if (!loaded) return;
            if (!revealed) {
                document.getElementById('card').classList.add('revealed');
                document.getElementById('hint').textContent = 'click again for a new one';
                revealed = true;
            } else {
                loadNew();
            }
        }
    </script>
</body>
</html>
